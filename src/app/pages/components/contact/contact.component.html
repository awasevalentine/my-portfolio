  <div class="main-content-wrapper">
    <div class="container">

            <i class="fa fa-phone mr-2"></i>

            </p>
          </div>

          <div class="col-sm-12 col-md-4">
            <i class="fa fa-envelope mr-2"></i>
            <b>Email:</b>
            <br>
            <p class="ml-4">
             <a href="mailto:awasevalentine@gmail.com">awasevalentine@gmail.com</a>

            <i class="fa fa-home mr-2"></i>

             29 Joseph Avenue, Sangotedo, Lekki, Lagos Nigeria.
            </p>
          </div>


        </div>
      </div>

      <div class="visitor-message w-100 pt-5">

        <form [formGroup]="contactForm" method="POST" action="contact" (ngSubmit)="submitForm()" class="w-100">
          <div class="row">
            <div class="col-sm-12 col-md-6">
              <div class="form-group">
                <input type="text" class="form-control-lg w-100" autocomplete="off" id="name" name="name" formControlName="name"  placeholder="Name *">

                <mat-error class="text-danger" *ngIf = "contactForm.invalid">{{errorMessage("name")}}</mat-error>
                
              </div>
            </div>
            <div class="col-sm-12 col-md-6">
              <div class="form-group">
                <input type="email" class="form-control-lg w-100" autocomplete="off" id="email" name="email" formControlName="email"  placeholder="Email *" required>
                <mat-error class="text-danger" *ngIf = "contactForm.invalid">
                  {{errorMessage("email")}}
                </mat-error>
              </div>
            </div>
          </div>

          <div class="message-subject">
              <input type="text" class="form-control-lg w-100" autocomplete="off" id="subject" name="subject" formControlName="subject"  placeholder="Subject" required>
          </div>

          <div class="message pt-3">
            <textarea name="message" id="message" cols="20" rows="7" autocomplete="off" id="message" class="from-control-lg w-100" formControlName="message"  placeholder="Your Messsage *" required></textarea>
            <mat-error class="text-danger" *ngIf = "contactForm.invalid">
              {{errorMessage("message")}}
            </mat-error>
          </div>

          <div class="button-wrapper">
            
            <div class="d-flex justify-content-center pb-3" *ngIf="loaderIsActive">
              <div class="spinner-border" role="status">
                <span class="visually-hidden">Loading...</span>
              </div>
            </div>

            <button type="submit" class="btn btn-dark" [disabled]="!this.contactForm.valid">
              Send Message
            </button>
          </div>

          <div class="displayMessage" *ngIf="displayMessage()">
           {{displayMessage()}}
          </div>

        </form>
      </div>
    </div>
  </div>
